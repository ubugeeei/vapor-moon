name = "Vapor Moon"
code_fence_block_name = "mbtv"
grammar = "vue"
path_suffixes = ["mbtv"]
block_comment = ["<!-- ", " -->"]
autoclose_before = ";:.,=}])>"
word_characters = ["-"]
completion_query_characters = ["-", ":", "@", "."]
language_servers = ["vapor-moon-lsp"]
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
  { start = "<", end = ">", close = false, newline = true, not_in = ["string", "comment"] },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
  { start = "'", end = "'", close = true, newline = false, not_in = ["string", "comment"] },
  { start = "`", end = "`", close = true, newline = false, not_in = ["string"] },
]
wrap_characters = { start_prefix = "<", start_suffix = ">", end_prefix = "</", end_suffix = ">" }

[jsx_tag_auto_close]
open_tag_node_name = "start_tag"
close_tag_node_name = "end_tag"
jsx_element_node_name = "element"
tag_name_node_name = "tag_name"
erroneous_close_tag_node_name = "erroneous_end_tag"
erroneous_close_tag_name_node_name = "erroneous_end_tag_name"
